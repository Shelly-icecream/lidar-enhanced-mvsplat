# @package _global_

defaults:
  - override /dataset: nuscenes
  - override /model/encoder: costvolume
  - override /loss: [mse, lpips]

wandb:
  name: nuscenes_stage1
  tags: [nuscenes, stage1, finetune, visual_only]

data_loader:
  train:
    batch_size: 2
    num_workers: 0
    persistent_workers: false   
  test:
    batch_size: 1
    num_workers: 0
    persistent_workers: false   
  val:
    batch_size: 1               
    num_workers: 0              
    persistent_workers: false   

trainer:
  max_steps: 6000
  limit_val_batches: 0
  num_sanity_val_steps: 0
  gradient_clip_val: 0.5        

# ----- model params -----
model:
  encoder:
    num_depth_candidates: 128
    costvolume_unet_feat_dim: 128
    costvolume_unet_channel_mult: [1, 1, 1]
    costvolume_unet_attn_res: [4]
    gaussians_per_pixel: 1
    depth_unet_feat_dim: 32
    depth_unet_attn_res: [16]
    depth_unet_channel_mult: [1, 1, 1, 1, 1]
    unimatch_weights_path: null

# ----- optimizer / lr -----
optimizer:
  lr: 1.0e-4
  warm_up_steps: 500            
  cosine_lr: true               

# ----- losses -----
loss:
  lpips:
    apply_after_step: 0
    weight: 0.05

# ----- dataset -----
dataset:
  image_shape: [176, 320]
  root: datasets/nuscenes
  version: v1.0-mini

  near: 0.1
  far: 80.0

  augment: false
  skip_bad_shape: true
  cameras_are_circular: false
  overfit_to_scene: null
  max_fov: 120.0
  use_keyframe_only: true

  camera_name: CAM_FRONT
  num_context_views: 2
  num_target_views: 1
  frame_stride: 1

train:
  depth_mode: null              
  extended_visualization: false 
  print_log_every_n_steps: 50   

test:
  output_path: outputs/test     
  eval_time_skip_steps: 5
  compute_scores: false
  save_image: true
  save_video: false

checkpointing:
  load: checkpoints/re10k.ckpt   
  resume: false                           
  every_n_train_steps: 200              
  save_top_k: -1                          
  pretrained_model: null                  